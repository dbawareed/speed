<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سباق الدراجات النارية - النسخة المطورة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 850px;
            background: #0f0f23;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Glassmorphism UI */
        .ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }
        .stats-container {
            display: flex;
            gap: 10px;
        }
        .info-box {
            background: rgba(15, 15, 35, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .info-box span {
            display: block;
            font-size: 11px;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-box strong {
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        /* Audio Button */
        .audio-btn {
            background: rgba(15, 15, 35, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: #f0f;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
        }
        .audio-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        /* Menus */
        .menu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            transition: opacity 0.5s;
        }
        .menu h1 {
            font-size: 40px;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff;
            font-weight: 900;
        }
        .menu p {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            padding: 0 30px;
        }
        
        /* Neon Button */
        .btn {
            background: transparent;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 22px;
            color: #0ff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            pointer-events: auto;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2) inset, 0 0 20px rgba(0, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }

        /* Level Up Alert */
        .level-alert {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 0, 255, 0.8);
            border: 2px solid #fff;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            z-index: 15;
            box-shadow: 0 0 30px #f0f;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        .level-alert.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.4);
            color: rgba(0, 255, 255, 0.8);
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.1s;
        }
        .control-btn:active {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform: scale(0.9);
        }
        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }
        .high-score {
            color: #f0f;
            font-size: 18px;
            margin-top: 15px;
            text-shadow: 0 0 5px rgba(255,0,255,0.5);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui">
            <div class="stats-container">
                <div class="info-box">
                    <span>النقاط</span>
                    <strong id="score">0</strong>
                </div>
                <div class="info-box" style="border-color: rgba(255,0,255,0.3);">
                    <span style="color:#f0f;">المستوى</span>
                    <strong id="levelDisplay">1</strong>
                </div>
            </div>
            <div class="audio-btn" id="audioBtn">
                <i class="fas fa-volume-up" id="audioIcon"></i>
            </div>
        </div>

        <div id="levelAlert" class="level-alert">المستوى 2!</div>
        
        <div class="controls">
            <div class="control-btn" id="leftBtn"><i class="fas fa-chevron-right"></i></div>
            <div class="control-btn" id="rightBtn"><i class="fas fa-chevron-left"></i></div>
        </div>
        
        <div class="menu" id="menu">
            <h1>NEON RIDER</h1>
            <p>انطلق بأقصى سرعة وتجاوز المستويات!</p>
            <button class="btn" id="startBtn">ابدأ السباق <i class="fas fa-motorcycle"></i></button>
            <div class="high-score" id="highScore">أفضل نتيجة: 0</div>
            <div style="margin-top: 20px; color:#666; font-size:14px;">استخدم الأسهم للتحكم في الحاسوب</div>
        </div>
        
        <div class="menu hidden" id="gameOver">
            <h1 style="color: #ff3366; text-shadow: 0 0 20px #ff3366;">تحطم!</h1>
            <p id="finalScore" style="color: #fff; font-size: 24px; font-weight: bold;">نقاطك: 0</p>
            <button class="btn" id="restartBtn" style="border-color: #ff3366; color: #ff3366; box-shadow: 0 0 10px rgba(255,51,102,0.2) inset, 0 0 20px rgba(255,51,102,0.4);">
                إعادة المحاولة <i class="fas fa-redo"></i>
            </button>
            <div class="high-score" id="highScore2">أفضل نتيجة: 0</div>
        </div>
    </div>

    <script>
        // --- إعدادات الصوت (Web Audio API Synthesizer) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let isMuted = false;
        let engineOscillator, engineGain;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        const SoundFx = {
            playCrash: () => {
                if (isMuted || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            },
            playLevelUp: () => {
                if (isMuted || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine';
                
                // Arpeggio
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554.37, now + 0.1);
                osc.frequency.setValueAtTime(659.25, now + 0.2);
                osc.frequency.setValueAtTime(880, now + 0.3);

                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.1);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 0.6);
            },
            startEngine: () => {
                if (!audioCtx || engineOscillator) return;
                engineOscillator = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                engineOscillator.type = 'triangle';
                engineOscillator.frequency.value = 50;
                engineGain.gain.value = isMuted ? 0 : 0.1;
                engineOscillator.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOscillator.start();
            },
            updateEngine: (speedMultiplier) => {
                if (engineOscillator && !isMuted) {
                    engineOscillator.frequency.setTargetAtTime(50 + (speedMultiplier * 20), audioCtx.currentTime, 0.1);
                }
            },
            stopEngine: () => {
                if (engineOscillator) {
                    engineOscillator.stop();
                    engineOscillator.disconnect();
                    engineOscillator = null;
                }
            },
            toggleMute: () => {
                isMuted = !isMuted;
                const icon = document.getElementById('audioIcon');
                if (isMuted) {
                    icon.className = 'fas fa-volume-mute';
                    if (engineGain) engineGain.gain.value = 0;
                } else {
                    icon.className = 'fas fa-volume-up';
                    if (engineGain) engineGain.gain.value = 0.1;
                    initAudio();
                }
            }
        };

        document.getElementById('audioBtn').addEventListener('click', SoundFx.toggleMute);

        // --- اللعبة ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // عناصر واجهة المستخدم
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('levelDisplay');
        const menu = document.getElementById('menu');
        const gameOver = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreEl = document.getElementById('finalScore');
        const levelAlert = document.getElementById('levelAlert');
        
        let width, height, laneWidth, roadLeft, roadRight;
        let animationId, lastTime = 0;
        let gameActive = false;
        
        // متغيرات الحالة
        let score = 0;
        let currentLevel = 1;
        let speed = 0;
        let roadOffset = 0;
        let highScore = parseInt(localStorage.getItem('neonMotoHighScore')) || 0;
        
        // إعدادات المستويات (الألوان والسرعة)
        const levelsData = [
            { id: 1, req: 0, bg: '#0b0b1a', road: '#15152a', line: '#0ff', edge: '#f0f', baseSpeed: 6, spawnChance: 0.015 },
            { id: 2, req: 1000, bg: '#1a0b1a', road: '#2a152a', line: '#f0f', edge: '#0ff', baseSpeed: 8, spawnChance: 0.02 },
            { id: 3, req: 2500, bg: '#0b1a0b', road: '#152a15', line: '#0f0', edge: '#ff0', baseSpeed: 10, spawnChance: 0.025 },
            { id: 4, req: 4500, bg: '#1a1a0b', road: '#2a2a15', line: '#ff0', edge: '#f00', baseSpeed: 12, spawnChance: 0.03 },
            { id: 5, req: 7000, bg: '#1a0505', road: '#2a0a0a', line: '#f00', edge: '#fff', baseSpeed: 14, spawnChance: 0.035 }
        ];
        let currentLevelData = levelsData[0];

        const player = { x: 0, y: 0, width: 40, height: 70, speedX: 0, maxSpeedX: 7, tilt: 0 };
        let obstacles = [];
        let particles = [];
        let keys = { left: false, right: false, boost: false };

        function resize() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            laneWidth = width * 0.25;
            roadLeft = (width - laneWidth * 3) / 2;
            roadRight = roadLeft + laneWidth * 3;
            player.y = height - 120;
            if (!gameActive) player.x = width / 2;
        }

        window.addEventListener('resize', resize);
        resize();
        document.getElementById('highScore').textContent = 'أفضل نتيجة: ' + highScore;
        document.getElementById('highScore2').textContent = 'أفضل نتيجة: ' + highScore;

        function initGame() {
            initAudio();
            score = 0;
            currentLevel = 1;
            currentLevelData = levelsData[0];
            speed = currentLevelData.baseSpeed;
            player.x = width / 2;
            player.speedX = 0;
            player.tilt = 0;
            obstacles = [];
            particles = [];
            scoreEl.textContent = '0';
            levelEl.textContent = '1';
            SoundFx.startEngine();
        }

        function createObstacle() {
            const lanes = [roadLeft + laneWidth/2, roadLeft + laneWidth * 1.5, roadLeft + laneWidth * 2.5];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            const types = ['car', 'sportsCar', 'truck'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            let w = 45, h = 80, color;
            if (type === 'car') { color = '#ff0055'; h = 85; }
            else if (type === 'sportsCar') { color = '#00ffcc'; h = 90; w = 40; }
            else { w = 55; h = 110; color = '#ffcc00'; }
            
            // تأكد من عدم تداخل السيارات عند الإنشاء
            let canSpawn = true;
            for(let obs of obstacles) {
                if(Math.abs(obs.x - lane) < laneWidth && obs.y < 100) {
                    canSpawn = false;
                    break;
                }
            }

            if(canSpawn) {
                obstacles.push({
                    x: lane, y: -150, width: w, height: h, type: type, color: color,
                    speed: speed * 0.6 + Math.random() * 2
                });
            }
        }

        function spawnParticles(x, y, color, count, type = 'normal') {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * (type === 'crash' ? 15 : 4),
                    vy: (Math.random() - 0.5) * (type === 'crash' ? 15 : 4) + (type === 'exhaust' ? 5 : 0),
                    life: 1,
                    color: color,
                    size: Math.random() * (type === 'crash' ? 6 : 3) + 2,
                    type: type
                });
            }
        }

        // --- دوال الرسم ---
        function drawRoad() {
            // الخلفية
            ctx.fillStyle = currentLevelData.bg;
            ctx.fillRect(0, 0, width, height);
            
            // الطريق
            ctx.fillStyle = currentLevelData.road;
            ctx.fillRect(roadLeft, 0, laneWidth * 3, height);
            
            // تأثير التوهج للخطوط
            ctx.shadowBlur = 10;
            
            // خطوط المسار (متقطعة)
            ctx.shadowColor = currentLevelData.line;
            ctx.strokeStyle = currentLevelData.line;
            ctx.lineWidth = 3;
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(roadLeft + laneWidth * i, 0);
                ctx.lineTo(roadLeft + laneWidth * i, height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // حواف الطريق
            ctx.shadowColor = currentLevelData.edge;
            ctx.strokeStyle = currentLevelData.edge;
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(roadLeft, 0); ctx.lineTo(roadLeft, height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(roadRight, 0); ctx.lineTo(roadRight, height); ctx.stroke();
            
            ctx.shadowBlur = 0; // إعادة ضبط
            
            // تأثير الخطوط الجانبية السريعة (Grid effect)
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            let gridY = roadOffset % 50;
            while(gridY < height) {
                ctx.beginPath();
                ctx.moveTo(0, gridY); ctx.lineTo(roadLeft, gridY + 20);
                ctx.moveTo(width, gridY); ctx.lineTo(roadRight, gridY + 20);
                ctx.stroke();
                gridY += 50;
            }
        }

        function drawMotorcycle(x, y, tilt) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(tilt * 0.15);
            
            // توهج خلفي
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#0ff';
            
            // الجسم الأساسي
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.roundRect(-12, -30, 24, 60, 5);
            ctx.fill();

            ctx.shadowBlur = 0;

            // تفاصيل نيون
            ctx.fillStyle = '#0ff';
            ctx.fillRect(-8, -25, 16, 20); // الخزان
            
            ctx.fillStyle = '#f0f';
            ctx.fillRect(-6, 0, 12, 15); // المقعد

            // العجلات
            ctx.fillStyle = '#050505';
            ctx.fillRect(-6, -40, 12, 15); // أمامي
            ctx.fillRect(-8, 25, 16, 18);  // خلفي
            
            // إضاءة العجلات
            ctx.fillStyle = '#0ff';
            ctx.fillRect(-2, -38, 4, 10); 
            ctx.fillStyle = '#f0f';
            ctx.fillRect(-2, 28, 4, 12);

            // إضاءة أمامية
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, -35, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawObstacle(obs) {
            ctx.save();
            ctx.translate(obs.x, obs.y);
            
            // ظل وتوهج
            ctx.shadowBlur = 10;
            ctx.shadowColor = obs.color;
            
            // الجسم الأساسي
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.roundRect(-obs.width/2, -obs.height/2, obs.width, obs.height, 8);
            ctx.fill();

            // الطلاء الخارجي (نيون)
            ctx.strokeStyle = obs.color;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.shadowBlur = 0;

            // الزجاج
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.roundRect(-obs.width/2 + 4, -obs.height/2 + 10, obs.width - 8, obs.height * 0.25, 3);
            ctx.fill();
            
            ctx.beginPath();
            ctx.roundRect(-obs.width/2 + 4, obs.height/2 - 20, obs.width - 8, obs.height * 0.15, 3);
            ctx.fill();

            // أضواء خلفية
            ctx.fillStyle = '#f00';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#f00';
            ctx.fillRect(-obs.width/2 + 2, obs.height/2 - 4, 10, 4);
            ctx.fillRect(obs.width/2 - 12, obs.height/2 - 4, 10, 4);

            ctx.restore();
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                if(p.type === 'exhaust') {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = p.color;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        function checkLevelUp() {
            let nextLevel = levelsData.find(l => l.id === currentLevel + 1);
            if (nextLevel && score >= nextLevel.req) {
                currentLevel = nextLevel.id;
                currentLevelData = nextLevel;
                levelEl.textContent = currentLevel;
                
                SoundFx.playLevelUp();
                
                // إظهار تنبيه المستوى
                levelAlert.textContent = `المستوى ${currentLevel}!`;
                levelAlert.style.borderColor = currentLevelData.line;
                levelAlert.style.boxShadow = `0 0 30px ${currentLevelData.line}`;
                levelAlert.classList.add('show');
                
                spawnParticles(width/2, height/2, currentLevelData.line, 50, 'crash');
                
                setTimeout(() => {
                    levelAlert.classList.remove('show');
                }, 2000);
            }
        }

        // --- دورة التحديث ---
        function update(dt) {
            if (!gameActive) return;
            
            let timeFactor = dt / 16.6; // المعايرة لمعدل تحديث الشاشة

            // التحكم باللاعب
            if (keys.left) {
                player.speedX = Math.min(player.speedX + 0.6 * timeFactor, player.maxSpeedX);
                player.tilt = Math.max(player.tilt - 0.1 * timeFactor, -1);
            } else if (keys.right) {
                player.speedX = Math.max(player.speedX - 0.6 * timeFactor, -player.maxSpeedX);
                player.tilt = Math.min(player.tilt + 0.1 * timeFactor, 1);
            } else {
                player.speedX *= 0.85;
                player.tilt *= 0.85;
            }
            
            player.x += player.speedX * timeFactor;
            player.x = Math.max(roadLeft + 20, Math.min(roadRight - 20, player.x));
            
            // السرعة الإجمالية والمستوى
            let currentSpeed = currentLevelData.baseSpeed + (score % 2000) / 500;
            if (keys.boost) currentSpeed *= 1.4; // تيربو
            
            speed = currentSpeed;
            score += Math.floor(speed / 3);
            scoreEl.textContent = score;
            
            roadOffset += speed * timeFactor;
            SoundFx.updateEngine(speed / 10);
            
            checkLevelUp();
            
            // إنشاء السيارات
            if (Math.random() < currentLevelData.spawnChance * timeFactor) {
                createObstacle();
            }
            
            // تحديث السيارات والتصادم
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                // السيارات تتحرك أبطأ من اللاعب (تبدو وكأنها ترجع للخلف بالنسبة للاعب)
                obs.y += (speed - (obs.speed * 0.5)) * timeFactor; 
                
                if (obs.y > height + 150) {
                    obstacles.splice(i, 1);
                    score += 10; // مكافأة تخطي سيارة
                    continue;
                }
                
                // حساب الاصطدام الدقيق (Hitbox أصغر قليلاً من الحجم الفعلي)
                const hitMarginX = 10;
                const hitMarginY = 15;
                if (Math.abs(player.x - obs.x) < (player.width + obs.width) / 2 - hitMarginX &&
                    Math.abs(player.y - obs.y) < (player.height + obs.height) / 2 - hitMarginY) {
                    
                    spawnParticles(player.x, player.y - 20, '#ff3366', 40, 'crash');
                    spawnParticles(player.x, player.y, '#0ff', 30, 'crash');
                    gameOverGame();
                }
            }
            
            // جزيئات العادم (Exhaust)
            if (Math.random() < 0.5) {
                spawnParticles(player.x + (Math.random() > 0.5 ? 4 : -4), player.y + 35, '#0ff', 1, 'exhaust');
            }
            
            // تحديث الجزيئات
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeFactor;
                p.y += p.vy * timeFactor + (p.type === 'exhaust' ? speed * 0.5 : 0);
                p.life -= (p.type === 'crash' ? 0.02 : 0.05) * timeFactor;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            drawRoad();
            drawParticles();
            
            for (let obs of obstacles) {
                drawObstacle(obs);
            }
            
            // رسم اللاعب فقط إذا كانت اللعبة نشطة أو في شاشة البداية
            if(gameActive || menu.classList.contains('hidden') === false) {
                 drawMotorcycle(player.x, player.y, player.tilt);
            }
        }

        function loop(timestamp) {
            let dt = timestamp - lastTime;
            if(dt > 50) dt = 16; // منع قفزات الإطارات الكبيرة
            lastTime = timestamp;
            
            update(dt);
            render();
            
            animationId = requestAnimationFrame(loop);
        }

        function startGame() {
            initGame();
            gameActive = true;
            menu.classList.add('hidden');
            gameOver.classList.add('hidden');
            lastTime = performance.now();
            cancelAnimationFrame(animationId);
            loop(performance.now());
        }

        function gameOverGame() {
            gameActive = false;
            SoundFx.stopEngine();
            SoundFx.playCrash();
            
            if (score > highScore) {
                highScore = score;
                try { localStorage.setItem('neonMotoHighScore', highScore); } catch (e) {}
            }
            
            finalScoreEl.textContent = 'النقاط: ' + score;
            document.getElementById('highScore2').textContent = 'أفضل نتيجة: ' + highScore;
            document.getElementById('highScore').textContent = 'أفضل نتيجة: ' + highScore;
            
            setTimeout(() => {
                gameOver.classList.remove('hidden');
            }, 500); // تأخير بسيط لرؤية الانفجار
        }

        // --- التحكم ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
            if (e.key === 'ArrowUp' || e.key === ' ') { keys.boost = true; e.preventDefault(); }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === ' ') keys.boost = false;
        });

        // اللمس
        const setupTouch = (btn, keyProp) => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyProp] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyProp] = false; });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[keyProp] = true; });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[keyProp] = false; });
            btn.addEventListener('mouseleave', (e) => { e.preventDefault(); keys[keyProp] = false; });
        };
        
        // الأزرار مقلوبة لأن اتجاه الصفحة RTL (اليمين هو السهم الأيمن، لكنه يحرك لليمين منطقياً)
        setupTouch(document.getElementById('rightBtn'), 'right'); 
        setupTouch(document.getElementById('leftBtn'), 'left');

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // تهيئة العرض الأول
        resize();
        render(); // رسم إطار واحد مبدئي
    </script>
</body>
</html>
